{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Post a New Job</h2>
    <p class="text-muted mb-4">Fill in the details and drop a pin on the map to set the job location.</p>
    
    <form method="POST" action="{{ url_for('main.create_job') }}" id="jobForm">
        <div class="form-group">
            <label for="title" class="form-label">Job Title *</label>
            <input type="text" class="form-control" id="title" name="title" required placeholder="e.g. Delivery Driver">
        </div>
        
        <div class="form-group">
            <label for="short_description" class="form-label">Short Description</label>
            <input type="text" class="form-control" id="short_description" name="short_description" placeholder="Brief overview of the role">
        </div>
        
        <div class="form-group">
            <label for="description" class="form-label">Job Description *</label>
            <textarea class="form-control" id="description" name="description" required placeholder="Full details about requirements, salary, etc."></textarea>
        </div>
        
        <div class="form-group">
            <label class="form-label">Location *</label>
            <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 10px;">Click anywhere on the map to set the job location</p>
            <div id="map"></div>
            <input type="hidden" id="latitude" name="latitude" required>
            <input type="hidden" id="longitude" name="longitude" required>
        </div>
        
        <button type="submit" class="btn btn-primary mt-3">Post Job</button>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Default center
        var map = L.map('map').setView([20.5937, 78.9629], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var marker = null;

        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            if (marker) {
                marker.setLatLng(e.latlng);
            } else {
                marker = L.marker(e.latlng).addTo(map);
            }

            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lng;
        });

        document.getElementById('jobForm').addEventListener('submit', function(e) {
            if (!document.getElementById('latitude').value || !document.getElementById('longitude').value) {
                e.preventDefault();
                alert('Please select a location on the map before posting.');
            }
        });
        
        // Try getting user's location to center map closer
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(function(position) {
                map.setView([position.coords.latitude, position.coords.longitude], 12);
            });
        }
    });
</script>
{% endblock %}
